# For sideband, we use real data; for now, 15% of Run1+Run2 = 3.6283532e+19 

- name: "ICARUSNuMI_1muNp0pi_Random15PercentRealDataForSideband_FakeDataForSignal"

  isEnabled: true
  showSelectedEventCount: true

  selectedDataEntry: "Random15PercentRealDataForSideband_FakeDataForSignal"

  mc:
    tree: "AllSamples_FillTree/selectedEvents_NSigmas"
    filePathList:
      - "/Users/jskim/Documents/Neutrino/ICARUS/GUNDAM/work/rootfiles/240429_PostNuInt/MakeTree_NuMI_MC_Nu_Phase2_ReprocD_SkipCorrupt.root"
