    nominalWeightFormula: "CutType==1 ? ( IsData ? (0.) : (3.6283532e+19/8.0746178e+20) * ( (IsSignal==5 ? 0.67937750173924 : FluxWeightWithG3Chase * SPPQ2RW * SPPTpiMINERvAFittedReweight * TrackSplitRW) ) ) : ( IsData ? (Run<9300 ? 0.174105 : 0.145303) : (3.6283532e+19/8.0746178e+20) * ( (IsSignal==5 ? 0.67937750173924 : FluxWeightWithG3Chase * SPPQ2RW * SPPTpiMINERvAFittedReweight * TrackSplitRW) ) )"

  data:
    - name: "Random15PercentRealDataForSideband_FakeDataForSignal"
      tree: "AllSamples_FillTree/selectedEvents"
      nominalWeightFormula: "CutType==1 ? ( IsData ? (0.) : (3.6283532e+19/2.4197050e+20)  * (IsSignal==5 ? 0.67937750173924 : FluxWeightWithG3Chase * SPPQ2RW * SPPTpiMINERvAFittedReweight * TrackSplitRW) ) : ( IsData ? (1.) : (0.) )"
