      - "/exp/icarus/data/users/jsmedley/sbnana_jobsub/Mar20_26_Offbeam/MakeTree_Data_OffBeamNUMIMAJORITY_2023ANuMIReproc_Run2.root"

    nominalWeightFormula: "( IsData ? (Run<9300 ? 1.26862061947009 : 0.984613145608233) : ((Category == 11 ? 0.71202822 : CVWgt*POTWeightedTriggerWeight * 2.500616E+20/1.0900766e+21) )"

  data:
    - name: "asimovSignal"
      tree: "tclones/recoTree"
      ##                     Is signal selection then 0 for data events           and asimov for MC,                             else 1 for data events and 0 MC
