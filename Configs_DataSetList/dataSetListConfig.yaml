######
###### DATASETS FOR ICARUS NUMI MULTI-PROTON ANALYSIS
######

###### 'ICARUSNuMI_1mu2p0pi' - Used for fake data studies

###### 'ICARUSNuMI_1mu2p0pi_hybridData' - Asimov for signal selection, 100% data for sidebands
###### 'ICARUSNuMI_1mu2p0pi_hybridData_01' - Same as above with ThetaDelta2NPi fixed to 1
###### 'ICARUSNuMI_1mu2p0pi_hybridData_10' - Same as above with DecayAngMEC fixed to 1
###### 'ICARUSNuMI_1mu2p0pi_hybridData_11' - Same as above with DecayAngMEC and ThetaDelta2NPi fixed to 1

###### 'ICARUSNuMI_1mu2p0pi_thirtyPercent' - 30% unblinded data sample
###### 'ICARUSNuMI_1mu2p0pi_thirtyPercent_01' - Same as above with ThetaDelta2NPi fixed to 1
###### 'ICARUSNuMI_1mu2p0pi_thirtyPercent_10' - Same as above with DecayAngMEC fixed to 1
###### 'ICARUSNuMI_1mu2p0pi_thirtyPercent_11' - Same as above with DecayAngMEC and ThetaDelta2NPi fixed to 1


- name: "ICARUSNuMI_1mu2p0pi"

  isEnabled: true

  # "_selectedDataEntry_" is set by "selectedDataEntry"
  # - default: "Asimov"

  selectedDataEntry: "1to1Asimov"
  #selectedDataEntry: "signalUpBy2"
  #selectedDataEntry: "signalLinearInrease"
  #selectedDataEntry: "1pNpiUpBy50Perc"
  #selectedDataEntry: "1pNpiUpBy5"
  #selectedDataEntry: "EmpiricalMEC"
  #selectedDataEntru: "ValenciaMEC"
  #selectedDataEntry: "MartiniMEC"
  #selectedDataEntry: "FSI_INCL"
  #selectedDataEntry: "DecayAngMEC"
  #selectedDataEntry: "Theta_Delta2Npi" 
  #selectedDataEntry: "allDown30Percent"
  #selectedDataEntry: "increaseHammer"
  #selectedDataEntry: "decreaseHammer"


  # "_selectedToyEntry_" is set by "selectedToyEntry"
  # - default: "Asimov"

  # "_showSelectedEventCount_" is set by "showSelectedEventCount"
  # - default: true
  showSelectedEventCount: true

  # Parameters under development
  # "_devSingleThreadEventLoaderAndIndexer_" is set by "devSingleThreadEventLoaderAndIndexer"
  # "_devSingleThreadEventSelection_" is set by "devSingleThreadEventSelection"
  # "_sortLoadedEvents_" is set by "sortLoadedEvents"

  # Now we configure "DataDispenser" objects

  mc:
    ## "DataDispenser::DataDispenserParameters _parameters_" is configured by below
    
    ## _parameters_.treePath
    tree: "tclones/recoTree"
    ## _parameters_.filePathList
    filePathList:
      - "/exp/icarus/data/users/jsmedley/triggerWeightedMC/MakeTree_NuMI_MC_Nu_Phase2_2023ANuMIReproc_CAFTypeCommonRemerge_ReNuSyst250403_WithTrackSplit_BNBFixedProb_TriggerWeight_TClones.root"
      - "/exp/icarus/data/users/jsmedley/sbnana_jobsub/Mar20_26_Offbeam/MakeTree_Data_OffBeamNUMIMAJORITY_2023ANuMIReproc_Run1.root"
      - "/exp/icarus/data/users/jsmedley/sbnana_jobsub/Mar20_26_Offbeam/MakeTree_Data_OffBeamNUMIMAJORITY_2023ANuMIReproc_Run2.root"

    ## _parameters_.nominalWeightFormulaStr
    nominalWeightFormula: "( IsData ? (Run<9300 ? 1.26862061947009 : 0.984613145608233) : ((Category == 11 ? 0.71202822 : CVWgt*POTWeightedTriggerWeight * 2.500616E+20/1.0900766e+21) )"

    ## _parameters_.additionalVarsStorage is set by {"additionalLeavesStorage"}, {"additionalVarsStorage"}
    ## _parameters_.dummyVariablesList is set by "dummyVariablesList"
    ## _parameters_.useMcContainer is set by "useMcContainer"
    ## _parameters_.dialIndexFormula is set by "dialIndexFormula"
    ## _parameters_.selectionCutFormulaStr is set by "selectionCutFormula"

  data:
    ## DataDispenser for "Data" is a map; std::string-to-DataDispenser
    ## So the YAML config should be a "list"
    ## - By default, it copies the MC DataDispenser with a key of "Asimov"
    ## - Having name: "fromMc" will copy the MC Datadispenser
    ## Then below are added to the map


    - name: "1to1Asimov"
      tree: "tclones/recoTree"
      nominalWeightFormula: "( IsData ? (Run<9300 ? 1.26862061947009 : 0.984613145608233) : ((Category == 11 ? 0.71202822 : CVWgt*POTWeightedTriggerWeight) * 2.500616E+20/1.0900766e+21) )"
      filePathList:
        #- "/exp/icarus/data/users/jsmedley/triggerWeightedMC/MakeTree_NuMI_MC_Nu_Phase2_2023ANuMIReproc_CAFTypeCommonRemerge_ReNuSyst250403_WithTrackSplit_BNBFixedProb_TriggerWeight_TClones.root"
        #- "/exp/icarus/data/users/jsmedley/sbnana_jobsub/Mar20_26_Offbeam/MakeTree_Data_OffBeamNUMIMAJORITY_2023ANuMIReproc_Run1.root"
        #- "/exp/icarus/data/users/jsmedley/sbnana_jobsub/Mar20_26_Offbeam/MakeTree_Data_OffBeamNUMIMAJORITY_2023ANuMIReproc_Run2.root"

