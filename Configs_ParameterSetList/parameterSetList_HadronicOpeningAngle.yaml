# NOTES from Jaesung Kim
# Either "parameterDefinitions or "dialSetDefinitions" must be defined for each ParameterSet
# - "parameterDefinitions": We are using this for Splines, and give the yaml config
# - "dialSetDefinitions": Template or covairance matrix

##################################################
## Template
##################################################

- name: Template Parameter HadronicOpeningAngle
  isEnabled: true

  printDialSetsSummary: true

  # numberOfParameters: Can be automatically evaluated from dialSetDefinitions.parametersBinningPath
  nominalStepSize: 0.1
  # I choose not to set min/max parameter values here...
  # From Stephen's useful example, this we can say is true when the binning is based on a true parameter, so each slice should only correspond to one bin...
  useOnlyOneParameterPerEvent: true

  dialSetDefinitions:
    - name: Template Parameter HadronicOpeningAngle dialSetDefinitions
      applyOnDataSets: ["*"]
#      parametersBinningPath: "./binnings/binning_deltapt_true.txt"
      parametersBinningPath: "./binnings/binning_TrueHadronicOpeningAngle.txt"
#      applyCondition: "[Category] == 0 || [Category] == 2"
      applyCondition: "[IsSignal] == 1"
      printDialsSummary: true


##################################################
## x-sec
##################################################

# Parameters are defined by the covariance matrix
# Although the dials of each parameter are set with external files
- name: Cross section Systematics
  isEnabled: true

  printDialSetsSummary: true

  # default: false
  releaseFixedParametersOnHesse: true
  # "_parameterDefinitionFilePath_" is set by {"parameterDefinitionFilePath"}, {"covarianceMatrixFilePath"}
  covarianceMatrixFilePath: ./Configs_ParameterSet/GENIEDials/gundaminput_geniesyst.root
  # "_covarianceMatrixTMatrixD_" is set by "covarianceMatrixTMatrixD"
  covarianceMatrixTMatrixD: xsec_cov
  # "_parameterPriorTVectorD_" is set by "parameterPriorTVectorD"
  parameterPriorTVectorD: xsec_param_prior
  # "_parameterNameTObjArray_" is set by "parameterNameTObjArray"
  parameterNameTObjArray: xsec_param_names
  # "_parameterLowerBoundsTVectorD_" is set by "parameterLowerBoundsTVectorD"
  parameterLowerBoundsTVectorD: xsec_param_lb
  # "_parameterUpperBoundsTVectorD_" is set by "parameterUpperBoundsTVectorD"
  parameterUpperBoundsTVectorD: xsec_param_ub

  parameterDefinitions: "./Configs_ParameterSet/GENIEDials/GENIEDialsDef.yaml"

