##################################################
## Q2-W Template
##################################################

- name: BackgroundFit
  isEnabled: true

  printDialSetsSummary: true

  nominalStepSize: 0.1
  useOnlyOneParameterPerEvent: true

  dialSetDefinitions:
    - name: BackgroundFit dialSetDefinitions
      applyOnDataSets: ["*"]

      # Using (W,Q2)
      parametersBinningPath: "./binnings/binning_Q2_W_Template.txt"
      applyCondition: "[TrueNPiPlus] > 0 || [TrueNPiMinus] > 0"

      printDialsSummary: true

  # Prior from NuWro vs GENIE
  # - Prior = (40, 60) for (LoW,HiW)
  covarianceMatrixFilePath: "./Configs_ParameterSet/BackgroundFit/RegCov_Bins0Plus8_StrengthTenToThe0.00_PriorLoW0.4_PriorHiW0.6_NSet2.root"
  covarianceMatrixTMatrixD: "RegCov_Bins0Plus8_StrengthTenToThe0.00_PriorLoW0.4_PriorHiW0.6_NSet2"

